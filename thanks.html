<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Your Gutter Cleaning</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f3f7fc 0%, #eef4fb 100%);
      color: #101828;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 480px;
      width: 100%;
      padding: 32px;
      background: #fff;
      border: 1px solid #e4e7ec;
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(16, 24, 40, 0.1);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 26px;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 20px;
      color: #475467;
      line-height: 1.5;
    }
    .fallback {
      display: inline-block;
      margin-top: 12px;
      padding: 14px 22px;
      background: #1d4ed8;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
    }
    .fallback:hover {
      background: #1e40af;
    }
    .spinner {
      margin: 0 auto 16px;
      width: 32px;
      height: 32px;
      border: 3px solid #e4e7ec;
      border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" aria-hidden="true"></div>
    <h1>Thanks! One last step.</h1>
    <p>Sending you to our calendar to pick a date for your gutter cleaning&hellip;</p>
    <a id="fallback" class="fallback" href="https://calendly.com/gutterpros/gutter-cleaning">Pick a date</a>
  </div>

  <script>
    const CALENDLY_URL = 'https://calendly.com/gutterpros/gutter-cleaning';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqXVInrbcXK5Z4YLU-rFqa3d4ycv0GYOdSFP_D9O4opkOI1KZQqDCKspUPj6GtYacr/exec';

    function readLead() {
      try {
        const raw = localStorage.getItem('cgp_lastLead');
        if (raw) return JSON.parse(raw);
      } catch (_) { /* ignore */ }
      return null;
    }

    function buildCalendlyUrl(lead) {
      if (!lead || !lead.name || !lead.email) return CALENDLY_URL;
      const params = new URLSearchParams({
        name: lead.name,
        email: lead.email,
      });
      return `${CALENDLY_URL}?${params.toString()}`;
    }

    function sendBuyerConfirmation(lead) {
      if (!lead || !lead.email) return;
      // De-dupe: if we already fired the confirmation for this exact lead, skip.
      // (Square can sometimes re-redirect to thanks.html, e.g. on a back button.)
      try {
        const stamp = lead.timestamp || '';
        const seen = localStorage.getItem('cgp_confirmSent');
        if (seen && seen === stamp) return;
        localStorage.setItem('cgp_confirmSent', stamp);
      } catch (_) { /* ignore */ }

      const payload = Object.assign({}, lead, { action: 'confirm' });
      try {
        const blob = new Blob([JSON.stringify(payload)], { type: 'text/plain;charset=utf-8' });
        const queued = navigator.sendBeacon(APPS_SCRIPT_URL, blob);
        if (!queued) {
          fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            keepalive: true,
          }).catch(() => {});
        }
      } catch (_) { /* ignore */ }
    }

    const lead = readLead();
    const target = buildCalendlyUrl(lead);
    document.getElementById('fallback').href = target;
    sendBuyerConfirmation(lead);
    // Small delay so the user sees the "Sending you to..." card briefly,
    // which feels less abrupt than an instant flash-redirect.
    setTimeout(() => { window.location.replace(target); }, 600);
  </script>
</body>
</html>
